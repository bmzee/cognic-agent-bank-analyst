# Cognic AgentOS pack manifest — Wave-1 schema.
#
# Run `agentos validate .` to check this manifest against the kernel's
# build-time trust gate (seed placeholder attestations + a placeholder
# AgentCard JWS first — see README).

[pack]
pack_id = "cognic-agent-bank-analyst"
schema_version = 1
kind = "agent"

[identity]
# AGNTCY/OASF identity matrix. Agent packs declare the universally
# mandatory Wave-1 fields PLUS the two agent-pack-only card fields
# (cli/validators/identity.py): agent_card_url + agent_card_jws_path.
# The JWS path must resolve to a file inside the pack at validate time;
# `agentos sign --bundle .` signs agent_cards/agent-card.json and writes
# the real detached JWS to this path at release.
agent_id = "did:web:github.com:bmzee:cognic-agent-bank-analyst"
display_name = "Cognic Agent Bank Analyst"
provider_organization = "Cognic"
provider_url = "https://github.com/bmzee/cognic-agent-bank-analyst"
agent_card_url = "https://github.com/bmzee/cognic-agent-bank-analyst/releases/download/v0.2.0/agent-card.jws"
agent_card_jws_path = "agent_cards/agent-card.jws"

[data_governance]
# ADR-017 contract, declared from the AGENT's data flow: six governed data
# domains ride run_readonly_query under the ASKING USER's scope entitlement;
# the one leave action is separately action-entitled and approval-gated.
# Hence customer_pii + internal at tier customer_data_read. The kernel loop
# persists only a bounded task-tier memory digest (ADR-019); long-term writes
# are structurally off. No egress of its own: every capability call rides the
# kernel dispatch chokepoint.
data_classes = [
    "customer_pii",
    "internal",
]
purpose = "customer_support"
retention_policy = "task_only"
retention_max_window = 1
egress_allow_list = []

[risk_tier]
# ADR-014 risk tier. Data access reaches customer data, so
# customer_data_read is the kernel minimum for customer_pii. The separately
# classified high-risk action is controlled by its tool pack's tier,
# action entitlement, maker-checker approval, and action-context token.
tier = "customer_data_read"

# M8 (ADR-027) declarative agent block. The pack declares WHO the agent is
# and WHAT it requests, never how it runs. These sets are CEILINGS, not
# grants: tenant agent_assignments narrow them, and ingestion refuses a
# grant the persona never requested. atm-recon remains deliberately absent.
[agent]
persona_path = "AGENT.md"
requested_skills = [
    "customer-data",
    "financial-data",
    "cards-data",
    "hr-data",
    "orders-data",
    "warehouse-data",
]
requested_tools = [
    "cognic-tool-oracle-schema/run_readonly_query",
    "cognic-tool-hr-leave/apply_leave",
]
max_steps = 6

[supply_chain]
# ADR-016 attestation paths. Each path is checked at validate time; release
# custody populates them through `agentos sign --bundle .`.
attestation_paths = [
    "attestations/cosign.sig",
    "attestations/sbom.cdx.json",
]
