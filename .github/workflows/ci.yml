# PR-side CI for cognic-agent-bank-analyst.
#
# Two lanes (the pack is a declarative agent package — AGENT.md persona +
# signed manifest + an inert cognic.agents marker; no agent code, no DB,
# no live substrate lane):
#   - lint-type-unit     ruff lint + format + mypy + the manifest +
#                        AGENT.md + marker-inertness suites
#   - authoring-validate the pinned-kernel `agentos validate` build-time
#                        manifest-shape check (placeholder attestations +
#                        a placeholder AgentCard JWS seeded on the runner;
#                        the real cosign/SBOM bundle + the real JWS +
#                        `agentos verify` are release work)
#
# Signing/publishing (`agentos sign --bundle` + `agentos verify`) is RELEASE
# work — it shells out to cosign / syft / grype / pip-licenses — and lives in
# .github/workflows/sign-and-publish.yml, not here.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-type-unit:
    name: lint + type + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # uv.lock is intentionally gitignored (the pyproject pins are the source
      # of truth), so sync resolves at CI time — NOT `--frozen`.
      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Type-check
        run: uv run mypy src tests

      - name: Manifest + AGENT.md + marker-inertness tests
        run: uv run pytest tests/ -q

  authoring-validate:
    name: authoring (agentos validate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The `dev` extra provides the `agentos` authoring/governance CLI used
      # for the build-time check (pinned to the M8 kernel anchor that ships
      # the A8 agent-pack validator arms).
      - name: Sync dev dependencies (installs the pinned authoring CLI)
        run: uv sync --extra dev

      # `agentos validate` checks the manifest against the build-time trust
      # gate, which includes that each declared
      # [supply_chain].attestation_paths file exists AND that the
      # agent-pack-only [identity].agent_card_jws_path resolves to a file
      # inside the pack. The REAL bundle + AgentCard JWS are produced by
      # `agentos sign --bundle .` at release; it shells out to cosign /
      # syft / grype / pip-licenses, absent from this lane. So here we seed
      # throwaway placeholders — this makes the lane a manifest-SHAPE
      # check, NOT a signature/SBOM/JWS-content check (that is
      # `agentos verify` at release). Never committed.
      - name: Seed placeholder attestations + AgentCard JWS (manifest-shape check only)
        run: |
          mkdir -p attestations agent_cards
          printf 'ci-placeholder: cosign signature generated by `agentos sign --bundle` at release\n' > attestations/cosign.sig
          printf '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1}\n' > attestations/sbom.cdx.json
          printf 'ci-placeholder: AgentCard JWS generated by `agentos sign --bundle` at release\n' > agent_cards/agent-card.jws

      - name: agentos validate (build-time manifest-shape check)
        run: uv run agentos validate .
