# Protected release workflow for the declarative bank-analyst agent pack.
#
# Request validation never receives signing secrets. Publishing is held behind
# the GitHub "release" environment. The independently custodied cosign and
# AgentCard-JWS private keys must each derive the committed public root before
# any signing begins.

name: sign-and-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must equal pyproject.toml)
        required: true
        default: "0.2.0"
        type: string

permissions:
  contents: read

concurrency:
  group: sign-and-publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate-request:
    name: validate release request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout the requested revision with tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Refuse a stale, duplicate, or off-main release request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [ "$GITHUB_REF" = "refs/heads/main" ] || {
            echo "FATAL: releases must be dispatched from main" >&2
            exit 1
          }
          [ "$(git rev-parse HEAD)" = "$GITHUB_SHA" ] || {
            echo "FATAL: checkout does not match the workflow revision" >&2
            exit 1
          }
          [ -z "$(git status --porcelain --untracked-files=all)" ] || {
            echo "FATAL: release checkout is dirty" >&2
            exit 1
          }
          project_version="$(
            python3 -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])'
          )"
          [ "$REQUESTED_VERSION" = "$project_version" ] || {
            echo "FATAL: requested version does not match pyproject.toml" >&2
            exit 1
          }
          [ -s cosign.pub ] || {
            echo "FATAL: committed cosign.pub trust root is missing or empty" >&2
            exit 1
          }
          [ -s agent-card.pub ] || {
            echo "FATAL: committed agent-card.pub trust root is missing or empty" >&2
            exit 1
          }
          tag="v$project_version"
          ! git show-ref --verify --quiet "refs/tags/$tag" || {
            echo "FATAL: release tag already exists" >&2
            exit 1
          }
          ! gh release view "$tag" >/dev/null 2>&1 || {
            echo "FATAL: GitHub release already exists" >&2
            exit 1
          }

  release:
    name: sign, verify, and publish
    needs: validate-request
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout the exact approved revision with tags
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Check lock and sync the frozen authoring environment
        shell: bash
        run: |
          set -euo pipefail
          uv lock --check
          uv sync --frozen --extra dev
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install checksum-pinned cosign, syft, and grype
        shell: bash
        run: |
          set -euo pipefail
          COSIGN_VERSION=3.0.6
          COSIGN_SHA256=c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
          SYFT_VERSION=1.45.1
          SYFT_SHA256=20c84195e24927f50a3b2269946be51f4c4abc9d2f145fee7388b4199149f716
          GRYPE_VERSION=0.114.0
          GRYPE_SHA256=edda0968d8827daab01d32b3cd7de192ae0915005e7bbfcfef9e68e79bc43343

          curl --fail --location --silent --show-error --retry 5 --retry-all-errors \
            -o /tmp/cosign \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64"
          echo "${COSIGN_SHA256}  /tmp/cosign" | sha256sum -c -
          sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign

          curl --fail --location --silent --show-error --retry 5 --retry-all-errors \
            -o /tmp/syft.tar.gz \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          echo "${SYFT_SHA256}  /tmp/syft.tar.gz" | sha256sum -c -
          tar -xzf /tmp/syft.tar.gz -C /tmp syft
          sudo install -m 0755 /tmp/syft /usr/local/bin/syft

          curl --fail --location --silent --show-error --retry 5 --retry-all-errors \
            -o /tmp/grype.tar.gz \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          echo "${GRYPE_SHA256}  /tmp/grype.tar.gz" | sha256sum -c -
          tar -xzf /tmp/grype.tar.gz -C /tmp grype
          sudo install -m 0755 /tmp/grype /usr/local/bin/grype

          rm -f /tmp/cosign /tmp/syft.tar.gz /tmp/syft /tmp/grype.tar.gz /tmp/grype
          cosign version
          syft version
          grype version
          pip-licenses --version

      - name: Provision the environment-held cosign key
        shell: bash
        env:
          COGNIC_SIGNING_KEY_PATH: ${{ runner.temp }}/cosign.key
          COSIGN_PRIVATE_KEY: ${{ secrets.PRIMARY_COSIGN_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "$COSIGN_PRIVATE_KEY" ] || {
            echo "FATAL: PRIMARY_COSIGN_PRIVATE_KEY is empty" >&2
            exit 1
          }
          signing_key_material="$COSIGN_PRIVATE_KEY"
          unset COSIGN_PRIVATE_KEY
          umask 077
          printf '%s' "$signing_key_material" > "$COGNIC_SIGNING_KEY_PATH"
          unset signing_key_material
          [ -s "$COGNIC_SIGNING_KEY_PATH" ] || {
            echo "FATAL: provisioned cosign key is empty" >&2
            exit 1
          }
          chmod 0600 "$COGNIC_SIGNING_KEY_PATH"
          echo "COGNIC_SIGNING_KEY_PATH=$COGNIC_SIGNING_KEY_PATH" >> "$GITHUB_ENV"

      - name: Provision and decrypt the environment-held AgentCard JWS key
        shell: bash
        env:
          AGENT_CARD_JWS_ENCRYPTED_PRIVATE_KEY: ${{ secrets.PRIMARY_AGENT_CARD_JWS_ENCRYPTED_PRIVATE_KEY }}
          AGENT_CARD_JWS_PASSWORD: ${{ secrets.PRIMARY_AGENT_CARD_JWS_PASSWORD }}
          COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH: ${{ runner.temp }}/agent-card.key
        run: |
          set -euo pipefail
          [ -n "$AGENT_CARD_JWS_ENCRYPTED_PRIVATE_KEY" ] || {
            echo "FATAL: PRIMARY_AGENT_CARD_JWS_ENCRYPTED_PRIVATE_KEY is empty" >&2
            exit 1
          }
          [ -n "$AGENT_CARD_JWS_PASSWORD" ] || {
            echo "FATAL: PRIMARY_AGENT_CARD_JWS_PASSWORD is empty" >&2
            exit 1
          }
          encrypted_key_path="$RUNNER_TEMP/agent-card.enc.key"
          encrypted_key_material="$AGENT_CARD_JWS_ENCRYPTED_PRIVATE_KEY"
          unset AGENT_CARD_JWS_ENCRYPTED_PRIVATE_KEY
          umask 077
          printf '%s' "$encrypted_key_material" > "$encrypted_key_path"
          unset encrypted_key_material
          openssl pkey \
            -in "$encrypted_key_path" \
            -passin env:AGENT_CARD_JWS_PASSWORD \
            -out "$COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH"
          unset AGENT_CARD_JWS_PASSWORD
          [ -s "$COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH" ] || {
            echo "FATAL: decrypted AgentCard JWS key is empty" >&2
            exit 1
          }
          chmod 0600 "$COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH"
          echo "COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH=$COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH" >> "$GITHUB_ENV"

      - name: Verify both private keys derive the committed trust roots
        shell: bash
        env:
          COSIGN_PASSWORD: ${{ secrets.PRIMARY_COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "$COSIGN_PASSWORD" ] || {
            echo "FATAL: PRIMARY_COSIGN_PASSWORD is empty" >&2
            exit 1
          }
          cosign public-key --key "$COGNIC_SIGNING_KEY_PATH" > "$RUNNER_TEMP/derived-cosign.pub"
          cmp -s "$RUNNER_TEMP/derived-cosign.pub" cosign.pub || {
            echo "FATAL: environment cosign key does not match committed cosign.pub" >&2
            exit 1
          }
          openssl pkey \
            -in "$COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH" \
            -pubout \
            -out "$RUNNER_TEMP/derived-agent-card.pub"
          cmp -s "$RUNNER_TEMP/derived-agent-card.pub" agent-card.pub || {
            echo "FATAL: environment AgentCard JWS key does not match committed agent-card.pub" >&2
            exit 1
          }

      - name: Build, sign, verify, and publish the exact revision
        shell: bash
        env:
          COSIGN_PASSWORD: ${{ secrets.PRIMARY_COSIGN_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          rm -rf dist
          uv build --wheel
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl' -print)
          [ "${#wheels[@]}" -eq 1 ] || {
            echo "FATAL: expected exactly one wheel" >&2
            exit 1
          }
          uv run --extra dev agentos sign --bundle .
          uv run --extra dev agentos verify --trust-root cosign.pub .

          attestations=(
            attestations/cosign.sig
            attestations/sbom.cdx.json
            attestations/slsa-provenance.intoto.json
            attestations/intoto-layout.json
            attestations/vuln-scan.json
            attestations/license-audit.json
            attestations/bundle.sigstore
          )
          release_assets=(
            "${wheels[0]}"
            "${attestations[@]}"
            cosign.pub
            agent-card.pub
            agent_cards/agent-card.json
            agent_cards/agent-card.jws
          )
          for artifact in "${release_assets[@]}"; do
            [ -s "$artifact" ] || {
              echo "FATAL: expected release asset missing or empty: $artifact" >&2
              exit 1
            }
          done

          tag="v$REQUESTED_VERSION"
          repository_name="${GITHUB_REPOSITORY#*/}"
          gh release create "$tag" \
            "${release_assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "$repository_name $tag" \
            --notes "Declarative governed AgentOS agent pack. Independently verified cosign and AgentCard-JWS roots plus SBOM, SLSA, in-toto, vulnerability, and license evidence."

      - name: Remove the provisioned private keys
        if: always()
        shell: bash
        run: |
          rm -f \
            "${COGNIC_SIGNING_KEY_PATH:-}" \
            "${COGNIC_AGENT_CARD_JWS_SIGNING_KEY_PATH:-}" \
            "$RUNNER_TEMP/agent-card.enc.key" \
            "$RUNNER_TEMP/derived-cosign.pub" \
            "$RUNNER_TEMP/derived-agent-card.pub"
